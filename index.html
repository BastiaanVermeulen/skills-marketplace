<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneCleanCo Skills Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:'DM Sans',system-ui,sans-serif}
    .noscroll::-webkit-scrollbar{display:none}
    .noscroll{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .fade-up{animation:fadeUp .3s ease both}
    .spin{animation:spin .75s linear infinite}
    .blink{animation:blink 1.2s ease-in-out infinite}
    #err{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;padding:2rem;font-family:monospace;font-size:13px;overflow:auto;z-index:9999;white-space:pre-wrap;color:#b91c1c}
  </style>
</head>
<body>
<div id="root"></div>
<div id="err"></div>

<script>
// Catch ALL errors and display them visibly instead of blank page
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = 'JAVASCRIPT ERROR:\n' + msg + '\n\nSource: ' + src + '\nLine: ' + line + '\n\n' + (err ? err.stack : '');
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = (el.textContent || '') + '\nUNHANDLED PROMISE:\n' + e.reason;
});
</script>

<script>
"use strict";
window.APP_CONFIG = { apiBaseUrl: "https://fytk13kn1e.execute-api.ap-southeast-2.amazonaws.com/prod" };

window.storage = (function() {
  var AL = new Set(["employees","projects","interests"]);
  function lg(k){ try{ var v=localStorage.getItem(k); return v?{key:k,value:v}:null; }catch(e){ return null; } }
  function ls(k,v){ try{ localStorage.setItem(k,v); return{key:k,value:v}; }catch(e){ return null; } }
  return {
    get: async function(k) {
      var b = window.APP_CONFIG.apiBaseUrl;
      if (!b || !AL.has(k)) return lg(k);
      try {
        var r = await fetch(b+"/"+k);
        if (!r.ok) throw new Error("GET "+k+" failed: "+r.status);
        var items = await r.json();
        var vis = Array.isArray(items) ? items.filter(function(x){ return !x._deleted; }) : [];
        return { key:k, value:JSON.stringify(vis), shared:true };
      } catch(e) {
        console.error("storage.get:", e);
        return { key:k, value:JSON.stringify([]), shared:true };
      }
    },
    set: async function(k, v) {
      var b = window.APP_CONFIG.apiBaseUrl;
      if (!b || !AL.has(k)) return ls(k, v);
      var next = []; try{ next=JSON.parse(v||"[]"); if(!Array.isArray(next))next=[]; }catch(e){ next=[]; }
      var cur = []; try{ var r2=await fetch(b+"/"+k); if(r2.ok){var j=await r2.json(); cur=Array.isArray(j)?j:[];} }catch(e){}
      var nb = new Map();
      next.forEach(function(it){
        var id=(it&&it.id)||(crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()));
        nb.set(id, Object.assign({},it,{id:id,_deleted:false}));
      });
      var cb = new Map(); cur.forEach(function(it){ if(it&&it.id) cb.set(it.id,it); });
      var reqs = [];
      nb.forEach(function(it,id){ reqs.push(fetch(b+"/"+k+"/"+encodeURIComponent(id),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(it)})); });
      cb.forEach(function(it,id){ if(!nb.has(id)&&!it._deleted) reqs.push(fetch(b+"/"+k+"/"+encodeURIComponent(id),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({},it,{_deleted:true}))})); });
      try{ await Promise.all(reqs); }catch(e){ console.error("storage.set:", e); }
      return { key:k, value:JSON.stringify(Array.from(nb.values())), shared:true };
    },
    delete: async function(k){ try{ localStorage.removeItem(k); }catch(e){} return {key:k,deleted:true}; }
  };
}());

// Build icon helpers AFTER lucide loads
function mkIcon(name){
  var c = window.lucide && window.lucide[name];
  if (typeof c === "function") return c;
  return function(props){ return React.createElement("span", Object.assign({}, props, {style:Object.assign({display:"inline-block",width:"1em",height:"1em"}, props&&props.style)})); };
}
// Icons exposed globally for JSX block
window._Icons = null; // set after DOM ready
</script>

<script type="text/babel">
// Initialise icons (lucide UMD is sync-loaded before this runs)
const Icons = {
  Users:       mkIcon("Users"),
  Briefcase:   mkIcon("Briefcase"),
  BarChart3:   mkIcon("BarChart3"),
  Settings:    mkIcon("Settings"),
  Search:      mkIcon("Search"),
  Plus:        mkIcon("Plus"),
  X:           mkIcon("X"),
  Award:       mkIcon("Award"),
  Download:    mkIcon("Download"),
  ChevronRight:mkIcon("ChevronRight"),
  Target:      mkIcon("Target"),
  BookOpen:    mkIcon("BookOpen"),
  Pencil:      mkIcon("Pencil"),
  Trash2:      mkIcon("Trash2"),
  Mail:        mkIcon("Mail"),
  CheckCircle: mkIcon("CheckCircle"),
  AlertCircle: mkIcon("AlertCircle"),
  Bell:        mkIcon("Bell"),
  Layers:      mkIcon("Layers"),
};
const { useState, useEffect } = React;
const { Users,Briefcase,BarChart3,Settings,Search,Plus,X,Award,Download,
        ChevronRight,Target,BookOpen,Pencil,Trash2,Mail,CheckCircle,AlertCircle,Bell,Layers } = Icons;

const LEVELS = ["Beginner","Intermediate","Advanced","Expert"];
const CATS   = ["General","Engineering","Operations","Commercial","Finance","Legal","Safety","Digital","Analytics","Strategy","Management","Communications","Research"];
const AVAIL  = [
  {v:"Available",          l:"Available — ready for new projects"},
  {v:"Partially Available",l:"Partially Available — limited capacity"},
  {v:"Busy",               l:"Busy — not available right now"},
];

const parseAreas = v => v.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
const availCls   = a => a==="Available" ? "bg-emerald-100 text-emerald-700" : a==="Partially Available" ? "bg-amber-100 text-amber-700" : "bg-red-100 text-red-700";
const nextId     = arr => arr.length ? Math.max(...arr.map(x=>Number(x.id)||0))+1 : 1;

const openMailto = (subj, body) => {
  const a = document.createElement("a");
  a.href = "mailto:onecleanco@cleancoqld.com.au?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  a.style.display = "none";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
};

const exportCSV = (emps) => {
  const rows = [["Name","Role","Department","Team","Availability","Skills","Growth Areas"]];
  emps.forEach(e => rows.push([e.name,e.role,e.department,e.team,e.availability,(e.skills||[]).map(s=>s.name+"("+s.level+")").join("; "),(e.growthAreas||[]).join("; ")]));
  const csv = rows.map(r => r.map(c => '"'+String(c||"").replace(/"/g,'""')+'"').join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = "skills-export.csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
};

// ── Sub-components ──────────────────────────────────────
const SkillBuilder = ({rows, setRows}) => (
  <div className="space-y-2">
    {rows.map((sk, i) => (
      <div key={i} className="flex gap-2 items-center">
        <input type="text" value={sk.name} required={i===0}
          onChange={e => { const r=[...rows]; r[i]={...r[i],name:e.target.value}; setRows(r); }}
          placeholder="e.g. Stakeholder Engagement"
          className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500"/>
        <select value={sk.level} onChange={e => { const r=[...rows]; r[i]={...r[i],level:e.target.value}; setRows(r); }}
          className="w-32 px-2 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
          {LEVELS.map(l => <option key={l}>{l}</option>)}
        </select>
        <select value={sk.category} onChange={e => { const r=[...rows]; r[i]={...r[i],category:e.target.value}; setRows(r); }}
          className="w-36 px-2 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
          {CATS.map(c => <option key={c}>{c}</option>)}
        </select>
        {rows.length > 1 && (
          <button type="button" onClick={() => setRows(rows.filter((_,j) => j!==i))}
            className="p-1.5 text-slate-400 hover:text-red-500 rounded-lg flex-shrink-0">
            <X className="w-4 h-4"/>
          </button>
        )}
      </div>
    ))}
    <button type="button" onClick={() => setRows([...rows, {name:"",level:"Intermediate",category:"General"}])}
      className="flex items-center gap-2 px-3 py-2 text-sm bg-sky-50 text-sky-600 rounded-lg hover:bg-sky-100">
      <Plus className="w-4 h-4"/> Add Skill
    </button>
  </div>
);

const Toast = ({msg, type}) => (
  <div className={"fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] px-5 py-3 rounded-xl shadow-xl text-sm font-semibold text-white flex items-center gap-2 fade-up " + (type==="error" ? "bg-red-500" : "bg-emerald-500")}>
    {type==="error" ? "✕" : "✓"} {msg}
  </div>
);

const Loading = () => (
  <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center gap-5">
    <div className="w-14 h-14 bg-gradient-to-br from-orange-500 to-orange-400 rounded-2xl flex items-center justify-center shadow-lg">
      <Award className="w-8 h-8 text-white"/>
    </div>
    <p className="text-slate-600 font-medium">Loading Skills Marketplace…</p>
    <div className="flex gap-1.5">
      {[0,1,2].map(i => <div key={i} className="w-2 h-2 rounded-full bg-sky-400 blink" style={{animationDelay: i*0.2+"s"}}/>)}
    </div>
  </div>
);

const Modal = ({onClose, children, wide}) => (
  <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
    <div className={"bg-white rounded-2xl shadow-2xl w-full " + (wide ? "max-w-2xl" : "max-w-lg") + " max-h-[92vh] overflow-y-auto"} onClick={e => e.stopPropagation()}>
      {children}
    </div>
  </div>
);

const Field = ({name, label, placeholder, req=true, defaultValue=""}) => (
  <div>
    <label className="block text-xs font-semibold text-slate-600 mb-1">{label}{req ? " *" : ""}</label>
    <input name={name} required={req} defaultValue={defaultValue} placeholder={placeholder}
      className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500"/>
  </div>
);

const AvailSelect = ({def="Available"}) => (
  <div>
    <label className="block text-xs font-semibold text-slate-600 mb-1">Availability *</label>
    <select name="availability" required defaultValue={def}
      className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
      {AVAIL.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  </div>
);

// ── Main App ────────────────────────────────────────────
const App = () => {
  const [loading,  setLoading]  = useState(true);
  const [emps,     setEmps]     = useState([]);
  const [projs,    setProjs]    = useState([]);
  const [ints,     setInts]     = useState([]);
  const [tab,      setTab]      = useState("self-service");
  const [toast,    setToast]    = useState(null);
  const [pSrch,    setPSrch]    = useState("");
  const [pDept,    setPDept]    = useState("all");
  const [dSrch,    setDSrch]    = useState("");
  const [dDept,    setDDept]    = useState("all");
  const [dTeam,    setDTeam]    = useState("all");
  const [aLvl,     setALvl]     = useState("enterprise");
  const [aDept,    setADept]    = useState("all");
  const [aTeam,    setATeam]    = useState("all");
  const [modal,    setModal]    = useState(null);
  const [editEmp,  setEditEmp]  = useState(null);
  const [ePrj,     setEPrj]     = useState(null);
  const [eName,    setEName]    = useState("");
  const [eSubj,    setESubj]    = useState("");
  const [eBody,    setEBody]    = useState("");
  const [dupP,     setDupP]     = useState(null);
  const [dupM,     setDupM]     = useState(null);
  const [aSub,     setASub]     = useState("employees");
  const [fSkills,  setFSkills]  = useState([{name:"",level:"Intermediate",category:"General"}]);
  const [fGrowth,  setFGrowth]  = useState("");
  const [fDirty,   setFDirty]   = useState(false);
  const [fDone,    setFDone]    = useState(false);
  const [fBusy,    setFBusy]    = useState(false);
  const [aSkills,  setASkills]  = useState([{name:"",level:"Intermediate",category:"General"}]);
  const [aGrowth,  setAGrowth]  = useState("");
  const [eSkills,  setESkills]  = useState([]);
  const [eGrowth,  setEGrowth]  = useState("");

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  useEffect(() => {
    (async () => {
      try {
        const [e, p, i] = await Promise.all([
          window.storage.get("employees"),
          window.storage.get("projects"),
          window.storage.get("interests"),
        ]);
        setEmps(e && e.value ? JSON.parse(e.value) : []);
        setProjs(p && p.value ? JSON.parse(p.value) : []);
        setInts(i && i.value ? JSON.parse(i.value) : []);
      } catch(err) {
        console.error("Load failed:", err);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const depts    = [...new Set(emps.map(e=>e.department).filter(Boolean))];
  const allTeams = [...new Set(emps.map(e=>e.team).filter(Boolean))];
  const aTeams   = aDept==="all" ? allTeams : [...new Set(emps.filter(e=>e.department===aDept).map(e=>e.team).filter(Boolean))];

  useEffect(() => { if(aLvl==="enterprise"){ setADept("all"); setATeam("all"); } }, [aLvl]);
  useEffect(() => { if(!aTeams.includes(aTeam)) setATeam("all"); }, [aDept]);

  const aSet = emps.filter(e => (aDept==="all"||e.department===aDept) && (aTeam==="all"||e.team===aTeam));
  const skillMap={}, deptMap={};
  aSet.flatMap(e=>e.skills||[]).forEach(sk => {
    if(!skillMap[sk.name]) skillMap[sk.name]={count:0};
    skillMap[sk.name].count++;
  });
  aSet.forEach(e => {
    if(!deptMap[e.department]) deptMap[e.department]={};
    (e.skills||[]).forEach(sk => { deptMap[e.department][sk.name]=(deptMap[e.department][sk.name]||0)+1; });
  });
  const topSkills = Object.entries(skillMap).sort((a,b)=>b[1].count-a[1].count).slice(0,10);
  const gMap = {};
  aSet.forEach(e => (e.growthAreas||[]).forEach(a => {
    const k = a.trim().toLowerCase(); if(!k) return;
    if(!gMap[k]) gMap[k]={count:0,label:a.trim()};
    gMap[k].count++;
  }));
  const topGrowth = Object.entries(gMap).sort((a,b)=>b[1].count-a[1].count).slice(0,10);

  const saveE = d => { setEmps(d);  window.storage.set("employees", JSON.stringify(d)); };
  const saveP = d => { setProjs(d); window.storage.set("projects",  JSON.stringify(d)); };
  const saveI = d => { setInts(d);  window.storage.set("interests", JSON.stringify(d)); };

  const goTab = id => {
    if(fDirty && tab==="self-service" && !fDone && !window.confirm("Unsaved changes. Leave?")) return;
    setTab(id);
  };

  const submitProfile = async e => {
    e.preventDefault();
    const valid = fSkills.filter(s => s.name.trim());
    if(!valid.length){ showToast("Please add at least one skill.", "error"); return; }
    setFBusy(true);
    const fd = new FormData(e.target);
    const name = fd.get("name").trim();
    const ex = emps.find(x => x.name.toLowerCase()===name.toLowerCase());
    const emp = { id: ex?ex.id:nextId(emps), name, role:fd.get("role"), department:fd.get("department"), team:fd.get("team"), availability:fd.get("availability"), skills:valid, growthAreas:parseAreas(fGrowth), submittedAt:new Date().toISOString() };
    if(ex){ setDupP(emp); setDupM(ex); setFBusy(false); setModal("dup"); }
    else  { await saveE([...emps, emp]); setFBusy(false); setFDone(true); setFDirty(false); }
  };

  const dupUpdate = async () => { await saveE(emps.map(e=>e.id===dupP.id?dupP:e)); setModal(null); setFDone(true); setFDirty(false); };
  const dupNew    = async () => { await saveE([...emps, {...dupP,id:nextId(emps)}]); setModal(null); setFDone(true); setFDirty(false); };

  const openInt = proj => {
    setEPrj(proj); setEName(""); setESubj("Expression of Interest – "+proj.title);
    setEBody("Hi,\n\nI would like to express my interest in the \""+proj.title+"\" project.\n\nPlease let me know the next steps.\n\nKind regards,\n[Your name]");
    setModal("email");
  };
  const sendInt = async () => {
    openMailto(eSubj, eBody);
    await saveI([...ints, {id:Date.now(), projectId:ePrj.id, projectTitle:ePrj.title, employeeName:eName.trim()||"Anonymous", createdAt:new Date().toISOString()}]);
    setModal("done"); setEPrj(null);
  };

  const delEmp  = async id => { const e=emps.find(x=>x.id===id); if(!e||!window.confirm("Delete "+e.name+"?")) return; await saveE(emps.filter(x=>x.id!==id)); };
  const openEdit = emp => { setEditEmp(emp); setESkills(emp.skills&&emp.skills.length?emp.skills.map(s=>({...s})):[{name:"",level:"Intermediate",category:"General"}]); setEGrowth((emp.growthAreas||[]).join("\n")); setModal("edit"); };
  const doEdit  = async e => { e.preventDefault(); const fd=new FormData(e.target); const valid=eSkills.filter(s=>s.name.trim()); await saveE(emps.map(x=>x.id===editEmp.id?{...editEmp,name:fd.get("name"),role:fd.get("role"),department:fd.get("department"),team:fd.get("team"),availability:fd.get("availability"),skills:valid,growthAreas:parseAreas(eGrowth)}:x)); setModal(null); setEditEmp(null); };
  const addEmp  = async e => { e.preventDefault(); const valid=aSkills.filter(s=>s.name.trim()); if(!valid.length){showToast("Please add at least one skill.","error");return;} const fd=new FormData(e.target); await saveE([...emps,{id:nextId(emps),name:fd.get("name"),role:fd.get("role"),department:fd.get("department"),team:fd.get("team"),availability:fd.get("availability"),skills:valid,growthAreas:parseAreas(aGrowth)}]); setModal(null); setASkills([{name:"",level:"Intermediate",category:"General"}]); setAGrowth(""); };
  const addProj = async e => { e.preventDefault(); const fd=new FormData(e.target); await saveP([...projs,{id:nextId(projs),title:fd.get("title"),manager:fd.get("manager"),description:fd.get("description"),department:fd.get("department"),duration:fd.get("duration"),requiredSkills:fd.get("skills").split(",").map(s=>s.trim()).filter(Boolean),status:"Open"}]); setModal(null); };

  const matchEmp = proj => emps.map(e => {
    const m = (e.skills||[]).filter(sk => (proj.requiredSkills||[]).includes(sk.name));
    return { emp:e, matched:m, pct: proj.requiredSkills.length ? (m.length/proj.requiredSkills.length)*100 : 0 };
  }).filter(x=>x.pct>0).sort((a,b)=>b.pct-a.pct);

  const dTeams_ = dDept==="all" ? allTeams : [...new Set(emps.filter(e=>e.department===dDept).map(e=>e.team).filter(Boolean))];
  const fEmps  = emps.filter(e  => { const q=dSrch.toLowerCase(); return (e.name.toLowerCase().includes(q)||(e.skills||[]).some(s=>s.name.toLowerCase().includes(q))||(e.growthAreas||[]).some(a=>a.toLowerCase().includes(q))) && (dDept==="all"||e.department===dDept) && (dTeam==="all"||e.team===dTeam); });
  const fProjs = projs.filter(p => { const q=pSrch.toLowerCase(); return (q===""||p.title.toLowerCase().includes(q)||(p.requiredSkills||[]).some(s=>s.toLowerCase().includes(q))) && (pDept==="all"||p.department===pDept); });

  if(loading) return <Loading/>;

  const TABS = [
    {id:"self-service",  label:"Submit Skills",   Icon:Award},
    {id:"opportunities", label:"Browse Projects",  Icon:Target},
    {id:"analytics",     label:"Analytics",         Icon:BarChart3},
    {id:"directory",     label:"Skills Directory",  Icon:BookOpen},
    {id:"projects",      label:"Project Matching",  Icon:Layers},
    {id:"admin",         label:"Admin",             Icon:Settings},
  ];

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-sky-50">

      <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <div className="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-400 rounded-xl flex items-center justify-center shadow-md flex-shrink-0">
              <Award className="w-6 h-6 text-white"/>
            </div>
            <div className="min-w-0">
              <h1 className="text-base sm:text-xl font-bold text-slate-900 truncate">Power Your Future. Plug into theirs.</h1>
              <p className="text-xs text-slate-500 hidden sm:block">OneCleanCo Skills Marketplace</p>
            </div>
          </div>
          <div className="flex items-center gap-2 text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 flex-shrink-0">
            <Users className="w-3.5 h-3.5 text-slate-400"/>
            <span className="font-semibold text-slate-700">{emps.length}</span>
            <span className="text-slate-500 hidden sm:inline">employees</span>
          </div>

      {modal==="email" && <Modal onClose={() => setModal(null)}>
        <div className="p-6">
          <h3 className="text-base font-bold mb-4">Express Interest — {ePrj&&ePrj.title}</h3>
          <div className="space-y-3">
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Your Name</label>
              <input type="text" value={eName} onChange={e => setEName(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Subject</label>
              <input value={eSubj} onChange={e => setESubj(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Body</label>
              <textarea rows="5" value={eBody} onChange={e => setEBody(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
          </div>
          <div className="mt-4 flex gap-3">
            <button onClick={() => setModal(null)} className="flex-1 py-2.5 border border-slate-300 rounded-xl text-sm">Cancel</button>
            <button onClick={sendInt} className="flex-1 py-2.5 bg-sky-600 text-white rounded-xl text-sm font-semibold">Open in Outlook</button>
          </div>
        </div>
      </Modal>}

      {modal==="done" && <Modal onClose={() => setModal(null)}>
        <div className="p-6 text-center">
          <CheckCircle className="w-12 h-12 text-emerald-500 mx-auto mb-3"/>
          <h3 className="text-lg font-bold mb-2">Interest Registered!</h3>
          <p className="text-sm text-slate-500 mb-4">Outlook should have opened. The project manager will be in touch.</p>
          <button onClick={() => setModal(null)} className="w-full py-2.5 bg-sky-600 text-white rounded-xl font-semibold text-sm">Done</button>
        </div>
      </Modal>}

      {modal==="addEmployee" && <Modal onClose={() => setModal(null)} wide>
        <div className="p-6">
          <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold">Add Employee</h3><button onClick={() => setModal(null)}><X className="w-5 h-5 text-slate-400"/></button></div>
          <form onSubmit={addEmp} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <Field name="name" label="Full Name" placeholder="Jane Smith"/>
              <Field name="role" label="Job Title" placeholder="Senior Analyst"/>
              <Field name="department" label="Business Unit" placeholder="Generation"/>
              <Field name="team" label="Team" placeholder="Asset Management"/>
              <div className="col-span-2"><AvailSelect/></div>
            </div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-2">Skills *</label><SkillBuilder rows={aSkills} setRows={setASkills}/></div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Wants to Learn</label>
              <textarea value={aGrowth} onChange={e => setAGrowth(e.target.value)} rows="2" className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
            <div className="flex gap-3">
              <button type="submit" className="flex-1 py-2.5 bg-sky-600 text-white rounded-xl font-semibold text-sm">Add Employee</button>
              <button type="button" onClick={() => setModal(null)} className="px-5 py-2.5 border border-slate-300 rounded-xl text-sm">Cancel</button>
            </div>
          </form>
        </div>
      </Modal>}

      {modal==="edit" && editEmp && <Modal onClose={() => setModal(null)} wide>
        <div className="p-6">
          <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold">Edit — {editEmp.name}</h3><button onClick={() => setModal(null)}><X className="w-5 h-5 text-slate-400"/></button></div>
          <form onSubmit={doEdit} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <Field name="name" label="Full Name" defaultValue={editEmp.name}/>
              <Field name="role" label="Job Title" defaultValue={editEmp.role}/>
              <Field name="department" label="Business Unit" defaultValue={editEmp.department}/>
              <Field name="team" label="Team" defaultValue={editEmp.team}/>
              <div className="col-span-2"><AvailSelect def={editEmp.availability}/></div>
            </div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-2">Skills *</label><SkillBuilder rows={eSkills} setRows={setESkills}/></div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Wants to Learn</label>
              <textarea value={eGrowth} onChange={e => setEGrowth(e.target.value)} rows="2" className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
            <div className="flex gap-3">
              <button type="submit" className="flex-1 py-2.5 bg-sky-600 text-white rounded-xl font-semibold text-sm">Save Changes</button>
              <button type="button" onClick={() => setModal(null)} className="px-5 py-2.5 border border-slate-300 rounded-xl text-sm">Cancel</button>
            </div>
          </form>
        </div>
      </Modal>}

      {modal==="addProject" && <Modal onClose={() => setModal(null)}>
        <div className="p-6">
          <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold">Add Project</h3><button onClick={() => setModal(null)}><X className="w-5 h-5 text-slate-400"/></button></div>
          <form onSubmit={addProj} className="space-y-4">
            <Field name="title"       label="Project Title"  placeholder="Q3 Data Initiative"/>
            <Field name="manager"     label="Manager"        placeholder="Full name"/>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Description *</label>
              <textarea name="description" required rows="2" className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
            <Field name="department"  label="Business Unit"  placeholder="Generation"/>
            <Field name="duration"    label="Duration"       placeholder="4–6 weeks"/>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Required Skills * (comma-separated)</label>
              <input name="skills" required className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm"/></div>
            <div className="flex gap-3">
              <button type="submit" className="flex-1 py-2.5 bg-sky-600 text-white rounded-xl font-semibold text-sm">Add Project</button>
              <button type="button" onClick={() => setModal(null)} className="px-5 py-2.5 border border-slate-300 rounded-xl text-sm">Cancel</button>
            </div>
          </form>
        </div>
      </Modal>}

      {toast && <Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
