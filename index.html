// Shared storage using AWS API Gateway + Lambda + DynamoDB
// Keeps the existing app contract: get/set JSON blobs per key (employees/projects/interests).
window.storage = {
  async get(key) {
    const base = window.APP_CONFIG?.apiBaseUrl;
    const allowed = new Set(["employees", "projects", "interests"]);
    if (!base || !allowed.has(key)) {
      // Fallback to localStorage for any non-collection keys
      try {
        const value = localStorage.getItem(key);
        return value ? { key, value, shared: false } : null;
      } catch {
        return null;
      }
    }

    try {
      const res = await fetch(`${base}/${key}`);
      if (!res.ok) throw new Error(`GET ${key} failed: ${res.status}`);
      const items = await res.json();
      const visible = Array.isArray(items) ? items.filter((x) => !x?._deleted) : [];
      return { key, value: JSON.stringify(visible), shared: true };
    } catch (e) {
      console.error("storage.get error:", e);
      return { key, value: JSON.stringify([]), shared: true, error: String(e?.message || e) };
    }
  },

  async set(key, value) {
    const base = window.APP_CONFIG?.apiBaseUrl;
    const allowed = new Set(["employees", "projects", "interests"]);
    if (!base || !allowed.has(key)) {
      // Fallback to localStorage for any non-collection keys
      try {
        localStorage.setItem(key, value);
        return { key, value, shared: false };
      } catch {
        return null;
      }
    }

    let next = [];
    try {
      next = JSON.parse(value || "[]");
      if (!Array.isArray(next)) next = [];
    } catch {
      next = [];
    }

    // Pull current server state so deletes persist (soft delete)
    let current = [];
    try {
      const res = await fetch(`${base}/${key}`);
      if (res.ok) {
        const j = await res.json();
        current = Array.isArray(j) ? j : [];
      }
    } catch {}

    const nextById = new Map();
    for (const item of next) {
      const id = item?.id || (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
      const clean = { ...(item || {}), id, _deleted: false };
      nextById.set(id, clean);
    }

    const currentById = new Map();
    for (const item of current) {
      if (item?.id) currentById.set(item.id, item);
    }

    const reqs = [];

    // Upsert new/updated items
    for (const [id, item] of nextById.entries()) {
      reqs.push(
        fetch(`${base}/${key}/${encodeURIComponent(id)}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(item),
        }).then((r) => {
          if (!r.ok) throw new Error(`PUT ${key}/${id} failed: ${r.status}`);
        })
      );
    }

    // Soft-delete items removed from the list
    for (const [id, existing] of currentById.entries()) {
      if (!nextById.has(id) && !existing?._deleted) {
        const tombstone = { ...existing, _deleted: true };
        reqs.push(
          fetch(`${base}/${key}/${encodeURIComponent(id)}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(tombstone),
          }).then((r) => {
            if (!r.ok) throw new Error(`PUT (delete) ${key}/${id} failed: ${r.status}`);
          })
        );
      }
    }

    try {
      await Promise.all(reqs);
      return { key, value: JSON.stringify(Array.from(nextById.values())), shared: true };
    } catch (e) {
      console.error("storage.set error:", e);
      return { key, value, shared: true, error: String(e?.message || e) };
    }
  },

  async delete(key) {
    // For collection keys, do nothing destructive (use set with empty array to soft-delete all).
    try {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: false };
    } catch {
      return null;
    }
  },

  async list(prefix) {
    // For compatibility; this app mainly uses get/set.
    try {
      const keys = ["employees", "projects", "interests"].filter(k => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: true };
    } catch {
      return { keys: [], shared: true };
    }
  }
};

  const getSkillAnalytics = (employeeSubset) => {
    const allSkills = employeeSubset.flatMap(emp => emp.skills || []);
    const skillMap = {};
    const categoryMap = {};
    const departmentSkills = {};
    const teamSkills = {};

    allSkills.forEach(skill => {
      if (!skillMap[skill.name]) {
        skillMap[skill.name] = { count: 0, levels: [], category: skill.category };
      }
      skillMap[skill.name].count++;
      skillMap[skill.name].levels.push(skill.level);

      if (!categoryMap[skill.category]) {
        categoryMap[skill.category] = 0;
      }
      categoryMap[skill.category]++;
    });

    employeeSubset.forEach(emp => {
      if (!departmentSkills[emp.department]) {
        departmentSkills[emp.department] = {};
      }
      if (!teamSkills[emp.team]) {
        teamSkills[emp.team] = { department: emp.department, skills: {} };
      }

      (emp.skills || []).forEach(skill => {
        if (!departmentSkills[emp.department][skill.name]) {
          departmentSkills[emp.department][skill.name] = 0;
        }
        departmentSkills[emp.department][skill.name]++;

        if (!teamSkills[emp.team].skills[skill.name]) {
          teamSkills[emp.team].skills[skill.name] = 0;
        }
        teamSkills[emp.team].skills[skill.name]++;
      });
    });

    return { skillMap, categoryMap, departmentSkills, teamSkills };
  };

  const platformMetrics = (() => {
    const totalProfiles = employees.length;
    const avgSkillsPerEmployee = totalProfiles === 0 ? 0
      : (employees.reduce((sum, e) => sum + (e.skills || []).length, 0) / totalProfiles).toFixed(1);
    const mentorCount = employees.filter(e => e.willingToMentor).length;
    const presenterCount = employees.filter(e => e.willingToPresent).length;
    const mentorPct = totalProfiles === 0 ? 0 : Math.round((mentorCount / totalProfiles) * 100);
    const presenterPct = totalProfiles === 0 ? 0 : Math.round((presenterCount / totalProfiles) * 100);

    const openProjects = projects.filter(p => !p._deleted && p.status !== 'Closed');
    const totalOpps = openProjects.length;
    const oppsWithInterest = openProjects.filter(p =>
      interests.some(i => !i._deleted && i.projectId === p.id)
    ).length;
    const oppEngagementRate = totalOpps === 0 ? null : Math.round((oppsWithInterest / totalOpps) * 100);
    const avgInterestPerOpp = totalOpps === 0 ? null
      : (interests.filter(i => !i._deleted).length / totalOpps).toFixed(1);

    // Skill supply vs demand gap
    const allRequiredSkills = openProjects.flatMap(p => p.requiredSkills || []);
    const requiredSkillCounts = {};
    allRequiredSkills.forEach(s => { requiredSkillCounts[s] = (requiredSkillCounts[s] || 0) + 1; });
    const employeeSkillCounts = {};
    employees.forEach(emp => {
      (emp.skills || []).forEach(s => {
        employeeSkillCounts[s.name] = (employeeSkillCounts[s.name] || 0) + 1;
      });
    });
    const skillGaps = Object.entries(requiredSkillCounts)
      .map(([skill, demand]) => ({
        skill,
        demand,
        supply: employeeSkillCounts[skill] || 0,
        gap: demand - (employeeSkillCounts[skill] || 0),
      }))
      .filter(s => s.supply < s.demand)
      .sort((a, b) => b.gap - a.gap || b.demand - a.demand)
      .slice(0, 8);

    // Mentor outreach metrics
    const mentorOutreachCount = interests.filter(i => !i._deleted && i.type === 'mentor').length;
    const seekingMentorCount = employees.filter(e => e.seekingMentor).length;
    const mentorConversionRate = seekingMentorCount === 0 ? null
      : Math.round((new Set(interests.filter(i => !i._deleted && i.type === 'mentor').map(i => i.mentorId)).size / mentorOutreachCount || 0) * 100);
    // % of people seeking a mentor who have sent at least one outreach (proxy: outreach events vs seekers)
    const seekerEngagementRate = seekingMentorCount === 0 ? null
      : Math.min(100, Math.round((mentorOutreachCount / seekingMentorCount) * 100));

    return { totalProfiles, avgSkillsPerEmployee, mentorCount, presenterCount,
      mentorPct, presenterPct, totalOpps, oppsWithInterest, oppEngagementRate,
      avgInterestPerOpp, skillGaps, mentorOutreachCount, seekingMentorCount, seekerEngagementRate };
  })();

                          const lower = val.toLowerCase();
                          const liveRoles = employees.map(emp => emp.role).filter(Boolean);
                          const allRoles = [...new Set([...liveRoles, ...HISTORICAL_TITLES])];
                          const matches = allRoles
                            .filter(r => r.toLowerCase().includes(lower))
                            .sort((a, b) => {
                              const aLive = liveRoles.includes(a), bLive = liveRoles.includes(b);
                              const aStarts = a.toLowerCase().startsWith(lower);
                              const bStarts = b.toLowerCase().startsWith(lower);
                              // Live roles first, then starts-with, then alpha
                              if (aLive && !bLive) return -1;
                              if (!aLive && bLive) return 1;
                              if (aStarts && !bStarts) return -1;
                              if (!aStarts && bStarts) return 1;
                              return a.localeCompare(b);
                            })
                            .slice(0, 8);

                              <div className="w-6 h-6 bg-gradient-to-br from-sky-500 to-sky-500 rounded-md flex items-center justify-center text-white text-xs font-bold">
                                {index + 1}
                              </div>
                              <span className="font-medium text-slate-900">{skill}</span>
                            </div>
                            <span className="text-sm font-semibold text-slate-700">{data.count} employees</span>
                          </div>
                          <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-sky-500 to-sky-500 rounded-full" style={{ width: `${percentage}%` }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white rounded-xl p-4 sm:p-6 border border-slate-200 shadow-sm">
                  <h3 className="text-base sm:text-lg font-semibold text-slate-900 mb-4">Employees want to learn:</h3>
                  {topGrowthAreas.length === 0 ? (
                    <div className="text-sm text-slate-600">No learning preferences captured yet.</div>
                  ) : (
                    <div className="space-y-3">
                      {topGrowthAreas.map(([key, data], index) => {
                        const maxCount = topGrowthAreas[0][1].count;
                        const percentage = (data.count / maxCount) * 100;
                        return (
                          <div key={key} className="group">
                            <div className="flex items-center justify-between mb-1">
                              <div className="flex items-center gap-3">
                                <div className="w-6 h-6 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-md flex items-center justify-center text-white text-xs font-bold">
                                  {index + 1}
                                </div>
                                <span className="font-medium text-slate-900">{data.label}</span>
                              </div>
                              <span className="text-sm font-semibold text-slate-700">{data.count} employees</span>
                            </div>
                            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                              <div className="h-full bg-gradient-to-r from-emerald-500 to-teal-500 rounded-full" style={{ width: `${percentage}%` }} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

                <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
                  <h3 className="text-lg font-semibold text-slate-900 mb-4">Skills by Business Unit</h3>
                  <div className="space-y-3">
                    {Object.entries(analytics.departmentSkills).map(([dept, skills]) => (
                      <div key={dept} className="border border-slate-200 rounded-lg p-4">
                        <div className="font-semibold text-slate-900 mb-2">{dept}</div>
                        <div className="text-sm text-slate-600">{Object.keys(skills).length} skills • {analyticsEmployees.filter(e => e.department === dept).length} employees</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
                  <h3 className="text-lg font-semibold text-slate-900 mb-4">Skills by Team</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {Object.entries(analytics.teamSkills).map(([team, data]) => {
                      const topTeamSkills = Object.entries(data.skills).sort((a, b) => b[1] - a[1]).slice(0, 5);
                      return (
                        <div key={team} className="border border-slate-200 rounded-lg p-4">
                          <h4 className="font-semibold text-slate-900">{team}</h4>
                          <p className="text-xs text-slate-600 mb-2">{data.department}</p>
                          {topTeamSkills.map(([skill, count]) => (
                            <div key={skill} className="flex items-center justify-between text-sm">
                              <span className="text-slate-700">{skill}</span>
                              <span className="text-slate-500">{count}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </>
            )}
          </div>
        )}



        {/* Skills Directory */}
        {activeTab === 'directory' && (
          <div className="space-y-4 sm:space-y-6">
            <div>
              <h2 className="text-2xl sm:text-3xl font-bold text-slate-900">Skills Directory</h2>
              <p className="text-sm sm:text-base text-slate-600 mt-2 max-w-2xl">Curious about what your colleagues know? Power your future by tapping into the expertise around you. Find someone with a specific skill for a project, identify a mentor to help you grow, or discover a presenter for your next team session — then reach out and make it happen.</p>
            </div>

            {/* Filters */}
            <div className="bg-white rounded-xl p-4 sm:p-4 border border-slate-200 shadow-sm">
              <div className="flex flex-col gap-3 sm:gap-4">
                <div className="flex-1">
                  <div className="relative">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                    <input
                      type="text"
                      placeholder="Search employees or skills..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-10 pr-4 py-2 sm:py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm sm:text-base"
                    />
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <select
                    value={selectedDepartment}
                    onChange={(e) => setSelectedDepartment(e.target.value)}
                    className="px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm sm:text-base"
                  >
                    <option value="all">All Portfolios</option>
                    {departments.map(dept => (
                      <option key={dept} value={dept}>{dept}</option>
                    ))}
                  </select>
                  <select
                    value={selectedTeam}
                    onChange={(e) => setSelectedTeam(e.target.value)}
                    className="px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm sm:text-base"
                  >
                    <option value="all">All Managers</option>
                    {teams.map(team => (
                      <option key={team} value={team}>{team}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Filter by Engagement</div>
                  <div className="flex flex-wrap gap-2">
                    {[
                      { value: 'all', label: 'All People' },
                      { value: 'mentor', label: '🎓 Happy to Mentor' },
                      { value: 'present', label: '🎤 Happy to Present' },
                    ].map(opt => (
                      <button
                        key={opt.value}
                        onClick={() => setSelectedEngagement(opt.value)}
                        className={`px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium transition-all ${
                          selectedEngagement === opt.value
                            ? 'bg-sky-600 text-white shadow-md'
                            : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                        }`}
                      >
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* Employee Cards */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
              {filteredEmployees.map(employee => (
                <div key={employee.id} className="bg-white rounded-xl p-4 sm:p-6 border border-slate-200 shadow-sm hover:shadow-md transition-all">
                  <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-4">
                    <div className="min-w-0">
                      <h3 className="font-semibold text-base sm:text-lg text-slate-900 truncate">{employee.name}</h3>
                      <p className="text-xs sm:text-sm text-slate-600">{employee.role}</p>
                      <p className="text-xs text-slate-500 mt-1">{employee.department}{employee.siteFunction ? ` · ${employee.siteFunction}` : ''} • {employee.team}</p>
                    </div>
                    <span className={`px-2 py-1 rounded-full text-xs font-medium whitespace-nowrap self-start ${
                      employee.availability === 'Available' 
                        ? 'bg-green-100 text-green-700'
                        : employee.availability === 'Partially Available'
                        ? 'bg-yellow-100 text-yellow-700'
                        : 'bg-red-100 text-red-700'
                    }`}>
                      {employee.availability}
                    </span>
                  </div>
                  <div className="space-y-2">
                    <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide">Skills</div>
                    <div className="flex flex-wrap gap-2">
                      {employee.skills.map((skill, idx) => (
                        <div key={idx} className="group relative">
                          <span className="px-2.5 py-1 sm:px-3 sm:py-1 bg-gradient-to-r from-sky-100 to-sky-100 text-sky-700 rounded-full text-xs font-medium cursor-help">
                            {skill.name}
                          </span>
                          <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2 py-1 bg-slate-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-10">
                            {skill.level} • {skill.category}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  {(employee.growthAreas || []).length > 0 && (
                    <div className="space-y-2 mt-4">
                      <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide">Wants to Learn</div>
                      <div className="flex flex-wrap gap-2">
                        {(employee.growthAreas || []).map((area, idx) => (
                          <span key={idx} className="px-2.5 py-1 sm:px-3 sm:py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-medium">
                            {area}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  <div className="mt-4 pt-3 border-t border-slate-100 space-y-2">
                    {(employee.willingToMentor || employee.willingToPresent) && (
                      <div className="flex flex-wrap gap-2">
                        {employee.willingToMentor && (
                          <span className="px-2.5 py-1 bg-violet-100 text-violet-700 rounded-full text-xs font-semibold">
                            🎓 Mentor
                          </span>
                        )}
                        {employee.willingToPresent && (
                          <span className="px-2.5 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-semibold">
                            🎤 Presenter
                          </span>
                        )}
                      </div>
                    )}
                    <button
                      onClick={() => {
                        setMentorEmailTarget(employee);
                        setInterestEmailSubject(`Getting in touch — ${employee.name}`);
                        setInterestEmailBody(`Hi ${employee.name},\n\nI came across your profile on the CleanCo Skills Marketplace and would love to connect.\n\nThanks,`);
                        setShowEmailModal(true);
                      }}
                      className="w-full py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold rounded-lg transition-colors"
                    >
                      Contact
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Projects */}
        {activeTab === 'projects' && (
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <h2 className="text-3xl font-bold text-slate-900">Opportunity Matching</h2>
              <button
                onClick={() => setShowAddProject(true)}
                className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-sky-600 to-sky-600 text-white rounded-lg hover:from-sky-700 hover:to-sky-700 transition-all shadow-md"
              >
                <Plus className="w-4 h-4" />
                New Opportunity
              </button>
            </div>

            {projects.map(project => {
              const matches = matchEmployeesToProject(project);
              return (
                <div key={project.id} className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
                  <div className="flex items-start justify-between mb-4">
                    <div>
                      <h3 className="text-xl font-semibold text-slate-900">{project.title}</h3>
                      <p className="text-sm text-slate-600 mt-1">
                        {project.department} • {project.duration} • {project.status}
                      </p>
                    </div>
                  </div>
                  
                  <div className="mb-4">
                    <div className="text-sm font-semibold text-slate-700 mb-2">Required Skills:</div>
                    <div className="flex flex-wrap gap-2">
                      {project.requiredSkills.map(skill => (
                        <span key={skill} className="px-3 py-1 bg-sky-100 text-sky-700 rounded-full text-sm font-medium">
                          {skill}
                        </span>
                      ))}
                    </div>
                  </div>

                  <div className="border-t border-slate-200 pt-4">
                    <div className="text-sm font-semibold text-slate-900 mb-3">
                      Top Matches ({matches.length} candidates)
                    </div>
                    <div className="space-y-3">
                      {matches.slice(0, 5).map((match, idx) => (
                        <div key={idx} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-200">
                          <div className="flex-1">
                            <div className="flex items-center gap-3">
                              <span className="font-medium text-slate-900">{match.employee.name}</span>
                              <span className="text-xs text-slate-600">{match.employee.role}</span>
                              <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                match.employee.availability === 'Available' 
                                  ? 'bg-green-100 text-green-700'
                                  : match.employee.availability === 'Partially Available'
                                  ? 'bg-yellow-100 text-yellow-700'
                                  : 'bg-red-100 text-red-700'
                              }`}>
                                {match.employee.availability}
                              </span>
                            </div>
                            <div className="flex flex-wrap gap-1 mt-2">
                              {match.matchedSkills.map((skill, i) => (
                                <span key={i} className="px-2 py-1 bg-sky-100 text-sky-700 rounded text-xs">
                                  {skill.name} ({skill.level})
                                </span>
                              ))}
                            </div>
                          </div>
                          <div className="ml-4 flex items-center gap-3">
                            <div className="text-right">
                              <div className="text-2xl font-bold text-sky-600">
                                {Math.round(match.matchPercentage)}%
                              </div>
                              <div className="text-xs text-slate-600">match</div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Add Project Modal */}
            {showAddProject && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-xl p-6 max-w-lg w-full">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-xl font-semibold">Add New Opportunity</h3>
                    <button onClick={() => setShowAddProject(false)} className="text-slate-400 hover:text-slate-600">
                      <X className="w-5 h-5" />
                    </button>
                  </div>
                  <form onSubmit={(e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const newProject = {
                      id: projects.length + 1,
                      title: formData.get('title'),
                      department: formData.get('department'),
                      duration: formData.get('duration'),
                      manager: formData.get('manager'),
                      contactEmail: formData.get('contactEmail'),
                      description: formData.get('description'),
                      requiredSkills: formData.get('skills').split(',').map(s => s.trim()),
                      status: 'Open'
                    };
                    saveProjects([...projects, newProject]);
                    setShowAddProject(false);
                  }}>
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Opportunity Title</label>
                        <input name="title" required className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Responsible Manager</label>
                        <input name="manager" required className="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="Full name" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Your Email Address</label>
                        <p className="text-xs text-slate-500 mb-1.5">Used so people expressing interest can contact you directly. Not shown publicly.</p>
                        <input name="contactEmail" type="email" required className="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="firstname.lastname@cleancoqld.com.au" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Brief Description</label>
                        <textarea name="description" required rows="3" className="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="What is this opportunity about and what will participants be doing?" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Business Unit</label>
                        <input name="department" required className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Duration</label>
                        <input name="duration" required className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Required Skills (comma-separated)</label>
                        <input name="skills" required className="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="React, TypeScript, AWS" />
                      </div>
                    </div>
                    <div className="mt-6 flex gap-3">
                      <button type="submit" className="flex-1 px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700">
                        Add Opportunity
                      </button>
                      <button type="button" onClick={() => setShowAddProject(false)} className="px-4 py-2 border border-slate-300 rounded-lg hover:bg-slate-50">
                        Cancel
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        )}


        {showEmailModal && (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={() => setShowEmailModal(false)}>
            <div className="bg-white rounded-xl p-6 max-w-lg w-full" onClick={(e) => e.stopPropagation()}>
              <h3 className="text-lg font-semibold text-slate-900 mb-1">{mentorEmailTarget ? "Reach out to a mentor" : "Express Interest"}</h3>
              <p className="text-sm text-slate-600 mb-4">
                {mentorEmailTarget ? <>Sending a mentoring request to <strong>{mentorEmailTarget.name}</strong>.</> : <>Send your expression of interest email for <strong>{selectedProjectForInterest?.title}</strong>.</>}
              </p>

              <div className="space-y-3">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">To</label>
                  <input
                    type="text"
                    value={mentorEmailTarget ? mentorEmailTarget.name : (selectedProjectForInterest?.contactEmail || 'onecleanco@cleancoqld.com.au')}
                    readOnly
                    className="w-full px-3 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-700"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                  <input
                    type="text"
                    value={interestEmailSubject}
                    onChange={(e) => setInterestEmailSubject(e.target.value)}
                    className="w-full px-3 py-2 border border-slate-300 rounded-lg"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Body</label>
                  <textarea
                    rows="4"
                    value={interestEmailBody}
                    onChange={(e) => setInterestEmailBody(e.target.value)}
                    className="w-full px-3 py-2 border border-slate-300 rounded-lg"
                  />
                </div>
              </div>

              <div className="mt-5 flex flex-wrap justify-end gap-3">
                <button
                  onClick={() => {
                    setShowEmailModal(false);
                    setSelectedProjectForInterest(null);
                    setMentorEmailTarget(null);
                  }}
                  className="px-4 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50"
                >
                  Cancel
                </button>
                <button
                  onClick={handleSendInterestEmail}
                  className="px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700"
                >
                  Send via Outlook
                </button>
              </div>
            </div>
          </div>
        )}

        {showInterestModal && (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={() => setShowInterestModal(false)}>
            <div className="bg-white rounded-xl p-6 max-w-lg w-full" onClick={(e) => e.stopPropagation()}>
              <h3 className="text-lg font-semibold text-slate-900 mb-3">An Outlook Message window will open</h3>
              <p className="text-sm text-slate-700 mb-5">
                Submit your interest via Outlook. Thanks for your interest in this opportunity! The responsible manager will review your profile and be in touch!
              </p>
              <div className="flex justify-end">
                <button
                  onClick={() => setShowInterestModal(false)}
                  className="px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700"
                >
                  OK
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SkillsMarketplace />);
  </script>
</body>
</html>
