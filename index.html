<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneCleanCo Skills Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.4"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'DM Sans', system-ui, -apple-system, sans-serif; }
    .tab-scroll::-webkit-scrollbar { display: none; }
    .tab-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.3s ease both; }
    .skeleton { animation: pulse 1.5s ease-in-out infinite; background: #e2e8f0; border-radius: 6px; }
    .spinner { animation: spin 0.8s linear infinite; }
    .skill-chip-enter { animation: fadeIn 0.15s ease both; }
  </style>

<body>
  <div id="root"></div>

<script>
window.APP_CONFIG = {
  apiBaseUrl: "https://fytk13kn1e.execute-api.ap-southeast-2.amazonaws.com/prod"
};

window.storage = {
  async get(key) {
    const base = window.APP_CONFIG?.apiBaseUrl;
    const allowed = new Set(["employees", "projects", "interests"]);
    if (!base || !allowed.has(key)) {
      try { const v = localStorage.getItem(key); return v ? { key, value: v, shared: false } : null; } catch { return null; }
    }
    try {
      const res = await fetch(`${base}/${key}`);
      if (!res.ok) throw new Error(`GET ${key} failed: ${res.status}`);
      const items = await res.json();
      const visible = Array.isArray(items) ? items.filter(x => !x?._deleted) : [];
      return { key, value: JSON.stringify(visible), shared: true };
    } catch (e) {
      console.error("storage.get error:", e);
      return { key, value: JSON.stringify([]), shared: true, error: String(e?.message || e) };
    }
  },
  async set(key, value) {
    const base = window.APP_CONFIG?.apiBaseUrl;
    const allowed = new Set(["employees", "projects", "interests"]);
    if (!base || !allowed.has(key)) {
      try { localStorage.setItem(key, value); return { key, value, shared: false }; } catch { return null; }
    }
    let next = [];
    try { next = JSON.parse(value || "[]"); if (!Array.isArray(next)) next = []; } catch { next = []; }
    let current = [];
    try {
      const res = await fetch(`${base}/${key}`);
      if (res.ok) { const j = await res.json(); current = Array.isArray(j) ? j : []; }
    } catch {}
    const nextById = new Map();
    for (const item of next) {
      const id = item?.id || (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
      nextById.set(id, { ...(item || {}), id, _deleted: false });
    }
    const currentById = new Map();
    for (const item of current) { if (item?.id) currentById.set(item.id, item); }
    const reqs = [];
    for (const [id, item] of nextById.entries()) {
      reqs.push(fetch(`${base}/${key}/${encodeURIComponent(id)}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(item) }).then(r => { if (!r.ok) throw new Error(`PUT ${key}/${id} failed: ${r.status}`); }));
    }
    for (const [id, existing] of currentById.entries()) {
      if (!nextById.has(id) && !existing?._deleted) {
        reqs.push(fetch(`${base}/${key}/${encodeURIComponent(id)}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ...existing, _deleted: true }) }).then(r => { if (!r.ok) throw new Error(`PUT (delete) failed`); }));
      }
    }
    try {
      await Promise.all(reqs);
      return { key, value: JSON.stringify(Array.from(nextById.values())), shared: true };
    } catch (e) {
      console.error("storage.set error:", e);
      return { key, value, shared: true, error: String(e?.message || e) };
    }
  },
  async delete(key) {
    try { localStorage.removeItem(key); return { key, deleted: true, shared: false }; } catch { return null; }
  },
  async list(prefix) {
    try {
      const keys = ["employees", "projects", "interests"].filter(k => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: true };
    } catch { return { keys: [], shared: true }; }
  }
};

const iconFallback = (props = {}) => React.createElement('span', { ...props, style: { display: 'inline-block', ...props.style } });
const toIconComponent = (name) => { const c = lucide?.[name]; return typeof c === 'function' ? c : iconFallback; };

const Users = toIconComponent('Users');
const Briefcase = toIconComponent('Briefcase');
const BarChart3 = toIconComponent('BarChart3');
const Settings = toIconComponent('Settings');
const Search = toIconComponent('Search');
const Plus = toIconComponent('Plus');
const X = toIconComponent('X');
const Award = toIconComponent('Award');
const Download = toIconComponent('Download');
const ChevronRight = toIconComponent('ChevronRight');
const Target = toIconComponent('Target');
const BookOpen = toIconComponent('BookOpen');
const Pencil = toIconComponent('Pencil');
const Trash2 = toIconComponent('Trash2');
const Mail = toIconComponent('Mail');
const CheckCircle = toIconComponent('CheckCircle');
const AlertCircle = toIconComponent('AlertCircle');
const TrendingUp = toIconComponent('TrendingUp');
const Loader = toIconComponent('Loader');
const Grid = toIconComponent('Grid');
const Bell = toIconComponent('Bell');
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Skill Row Builder (shared between self-service and admin add/edit) ──────
const SkillRowBuilder = ({ skillInputs, setSkillInputs }) => {
  const CATEGORIES = ['General','Engineering','Operations','Commercial','Finance','Legal','Safety','Digital','Analytics','Strategy','Management','Communications','Research'];
  const LEVELS = ['Beginner','Intermediate','Advanced','Expert'];
  return (
    <div className="space-y-2">
      {skillInputs.map((skill, index) => (
        <div key={index} className="skill-chip-enter flex gap-2 items-start">
          <input
            type="text"
            value={skill.name}
            onChange={e => { const s=[...skillInputs]; s[index]={...s[index],name:e.target.value}; setSkillInputs(s); }}
            className="flex-1 px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm"
            placeholder="e.g. Asset Management, Data Analysis, Stakeholder Engagement"
            required={index === 0}
          />
          <select value={skill.level} onChange={e => { const s=[...skillInputs]; s[index]={...s[index],level:e.target.value}; setSkillInputs(s); }}
            className="w-32 px-2 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm">
            {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
          <select value={skill.category} onChange={e => { const s=[...skillInputs]; s[index]={...s[index],category:e.target.value}; setSkillInputs(s); }}
            className="w-36 px-2 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm">
            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          {skillInputs.length > 1 && (
            <button type="button" onClick={() => setSkillInputs(skillInputs.filter((_,i)=>i!==index))}
              className="p-2 text-slate-400 hover:text-red-500 rounded-lg transition-colors flex-shrink-0">
              <X className="w-4 h-4" />
            </button>
          )}
        </div>
      ))}
      <button type="button" onClick={() => setSkillInputs([...skillInputs, {name:'',level:'Intermediate',category:'General'}])}
        className="flex items-center gap-2 px-3 py-2 text-sm bg-sky-50 text-sky-600 rounded-lg hover:bg-sky-100 transition-colors mt-1">
        <Plus className="w-4 h-4" /> Add Skill
      </button>
      {/* ── Toast Notification ── */}
      {toast && (
        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-xl shadow-lg text-sm font-semibold text-white transition-all animate-fade-in flex items-center gap-2 ${toast.type==='error' ? 'bg-red-500' : 'bg-emerald-500'}`}>
          {toast.type==='error' ? '✕' : '✓'} {toast.msg}
        </div>
      )}
    </div>
  );
};

// ── Loading Skeleton ──────────────────────────────────────────────────────────
const LoadingScreen = () => (
  <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-sky-50 flex flex-col items-center justify-center gap-6">
    <div className="w-14 h-14 bg-gradient-to-r from-orange-500 to-orange-400 rounded-2xl flex items-center justify-center shadow-lg">
      <Award className="w-8 h-8 text-white" />
    </div>
    <div className="text-center">
      <p className="text-slate-700 font-semibold text-lg">OneCleanCo Skills Marketplace</p>
      <p className="text-slate-500 text-sm mt-1">Loading data…</p>
    </div>
    <div className="flex gap-2">
      {[0,1,2].map(i => (
        <div key={i} className="w-2 h-2 rounded-full bg-sky-400 spinner" style={{animationDelay:`${i*0.15}s`,animationName:'pulse',animationDuration:'1s',animationTimingFunction:'ease-in-out',animationIterationCount:'infinite'}} />
      ))}
    </div>
  </div>
);

// ── CSV Export ────────────────────────────────────────────────────────────────
const exportCSV = (employees, projects, interests) => {
  const rows = [['Name','Role','Department','Team','Availability','Skills','Growth Areas']];
  employees.forEach(emp => {
    rows.push([
      emp.name, emp.role, emp.department, emp.team, emp.availability,
      (emp.skills||[]).map(s=>`${s.name}(${s.level})`).join('; '),
      (emp.growthAreas||[]).join('; ')
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='skills-export.csv'; a.click();
  URL.revokeObjectURL(url);
};

// ── Main App ─────────────────────────────────────────────────────────────────
const SkillsMarketplace = () => {
  const [isLoading, setIsLoading] = useState(true);
  const [toast, setToast] = useState(null); // { msg, type: 'success'|'error' }
  const showToast = (msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };
  const [activeTab, setActiveTab] = useState('self-service');
  const [employees, setEmployees] = useState([]);
  const [projects, setProjects] = useState([]);
  const [interests, setInterests] = useState([]);

  // Separate filter states per tab (Fix #1)
  const [projectSearch, setProjectSearch] = useState('');
  const [projectDept, setProjectDept] = useState('all');
  const [dirSearch, setDirSearch] = useState('');
  const [dirDept, setDirDept] = useState('all');
  const [dirTeam, setDirTeam] = useState('all');
  const [analyticsDept, setAnalyticsDept] = useState('all');
  const [analyticsTeam, setAnalyticsTeam] = useState('all');
  const [analyticsLevel, setAnalyticsLevel] = useState('enterprise');

  // Modals
  const [showAddProject, setShowAddProject] = useState(false);
  const [showAddEmployee, setShowAddEmployee] = useState(false);
  const [showEditEmployee, setShowEditEmployee] = useState(false);
  const [editingEmployee, setEditingEmployee] = useState(null);
  const [showEmailModal, setShowEmailModal] = useState(false);
  const [showInterestModal, setShowInterestModal] = useState(false);
  const [showDuplicateModal, setShowDuplicateModal] = useState(false);
  const [pendingEmployee, setPendingEmployee] = useState(null);
  const [duplicateMatch, setDuplicateMatch] = useState(null);
  const [selectedProjectForInterest, setSelectedProjectForInterest] = useState(null);
  const [interestEmailSubject, setInterestEmailSubject] = useState('');
  const [interestEmailBody, setInterestEmailBody] = useState('');
  const [interestName, setInterestName] = useState('');
  const [adminInterestView, setAdminInterestView] = useState('employees');

  // Self-service form state
  const [isSubmitting, setIsSubmitting] = useState(false);
  const [submissionSuccess, setSubmissionSuccess] = useState(false);
  const [skillInputs, setSkillInputs] = useState([{ name: '', level: 'Intermediate', category: 'General' }]);
  const [growthAreasInput, setGrowthAreasInput] = useState('');
  const [formDirty, setFormDirty] = useState(false);

  // Admin add employee state
  const [adminSkillInputs, setAdminSkillInputs] = useState([{ name: '', level: 'Intermediate', category: 'General' }]);
  const [adminGrowthInput, setAdminGrowthInput] = useState('');

  // Edit employee state
  const [editSkillInputs, setEditSkillInputs] = useState([]);
  const [editGrowthInput, setEditGrowthInput] = useState('');

  // Load data (Fix #2 - loading state)
  useEffect(() => {
    const loadData = async () => {
      try {
        if (window.storage) {
          const [storedEmployees, storedProjects, storedInterests] = await Promise.all([
            window.storage.get('employees'),
            window.storage.get('projects'),
            window.storage.get('interests')
          ]);
          setEmployees(storedEmployees?.value ? JSON.parse(storedEmployees.value) : []);
          setProjects(storedProjects?.value ? JSON.parse(storedProjects.value) : []);
          setInterests(storedInterests?.value ? JSON.parse(storedInterests.value) : []);
        }
      } catch (error) {
        console.error('Error loading stored data:', error);
      } finally {
        setIsLoading(false);
      }
    };
    loadData();
  }, []);

  const parseGrowthAreas = v => v.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);

  const saveEmployees = async (list) => { setEmployees(list); await window.storage?.set('employees', JSON.stringify(list)); };
  const saveProjects  = async (list) => { setProjects(list);  await window.storage?.set('projects',  JSON.stringify(list)); };
  const saveInterests = async (list) => { setInterests(list); await window.storage?.set('interests', JSON.stringify(list)); };

  // Navigation guard (Fix #10)
  const handleTabChange = (id) => {
    if (formDirty && activeTab === 'self-service' && !submissionSuccess) {
      if (!window.confirm('You have unsaved changes in your skills profile. Leave anyway?')) return;
    }
    setActiveTab(id);
  };

  // Analytics helpers
  const departments = [...new Set(employees.map(e=>e.department).filter(Boolean))];
  const teams = [...new Set(employees.map(e=>e.team).filter(Boolean))];
  const analyticsDepts = departments;
  const analyticsTeams = analyticsDept==='all' ? teams : [...new Set(employees.filter(e=>e.department===analyticsDept).map(e=>e.team).filter(Boolean))];

  useEffect(() => {
    if (analyticsLevel === 'enterprise') { setAnalyticsDept('all'); setAnalyticsTeam('all'); }
  }, [analyticsLevel]);

  useEffect(() => {
    if (!analyticsTeams.includes(analyticsTeam)) setAnalyticsTeam('all');
  }, [analyticsDept, analyticsTeam, analyticsTeams]);

  const analyticsEmployees = employees.filter(emp => {
    if (analyticsDept !== 'all' && emp.department !== analyticsDept) return false;
    if (analyticsTeam !== 'all' && emp.team !== analyticsTeam) return false;
    return true;
  });

  const getAnalytics = (subset) => {
    const skillMap = {}, categoryMap = {}, deptSkills = {}, teamSkills = {};
    subset.flatMap(e=>e.skills||[]).forEach(sk => {
      if (!skillMap[sk.name]) skillMap[sk.name] = { count:0, levels:[], category:sk.category };
      skillMap[sk.name].count++; skillMap[sk.name].levels.push(sk.level);
      categoryMap[sk.category] = (categoryMap[sk.category]||0)+1;
    });
    subset.forEach(emp => {
      if (!deptSkills[emp.department]) deptSkills[emp.department] = {};
      if (!teamSkills[emp.team]) teamSkills[emp.team] = { department:emp.department, skills:{} };
      (emp.skills||[]).forEach(sk => {
        deptSkills[emp.department][sk.name] = (deptSkills[emp.department][sk.name]||0)+1;
        teamSkills[emp.team].skills[sk.name] = (teamSkills[emp.team].skills[sk.name]||0)+1;
      });
    });
    return { skillMap, categoryMap, deptSkills, teamSkills };
  };

  const analytics = getAnalytics(analyticsEmployees);
  const topSkills = Object.entries(analytics.skillMap).sort((a,b)=>b[1].count-a[1].count).slice(0,10);
  const topGrowthMap = {};
  analyticsEmployees.forEach(emp => {
    (emp.growthAreas||[]).forEach(area => {
      const k = String(area||'').trim().toLowerCase();
      if (!k) return;
      if (!topGrowthMap[k]) topGrowthMap[k] = { count:0, label:String(area).trim() };
      topGrowthMap[k].count++;
    });
  });
  const topGrowthAreas = Object.entries(topGrowthMap).sort((a,b)=>b[1].count-a[1].count).slice(0,10);

  const matchEmployeesToProject = (project) =>
    employees.map(emp => {
      const matched = (emp.skills||[]).filter(sk => project.requiredSkills.includes(sk.name));
      return { employee:emp, matchedSkills:matched, matchPercentage:(matched.length/project.requiredSkills.length)*100 };
    }).filter(m=>m.matchPercentage>0).sort((a,b)=>b.matchPercentage-a.matchPercentage);

  // Self-service submit with duplicate guard (Fix #3)
  const handleProfileSubmit = async (e) => {
    e.preventDefault();
    const valid = skillInputs.filter(s=>s.name.trim());
    if (valid.length === 0) { showToast('Please add at least one skill.', 'error'); return; }
    setIsSubmitting(true);
    const formData = new FormData(e.target);
    const name = formData.get('name').trim();
    const existing = employees.find(emp => emp.name.toLowerCase() === name.toLowerCase());
    const newEmp = {
      id: existing ? existing.id : (employees.length ? Math.max(...employees.map(e=>e.id||0))+1 : 1),
      name, role: formData.get('role'), department: formData.get('department'),
      team: formData.get('team'), availability: formData.get('availability'),
      skills: valid, growthAreas: parseGrowthAreas(growthAreasInput),
      submittedAt: new Date().toISOString()
    };
    if (existing) {
      setPendingEmployee(newEmp);
      setDuplicateMatch(existing);
      setIsSubmitting(false);
      setShowDuplicateModal(true);
    } else {
      await saveEmployees([...employees, newEmp]);
      setSubmissionSuccess(true);
      setIsSubmitting(false);
      setFormDirty(false);
    }
  };

  const handleDuplicateUpdate = async () => {
    const updated = employees.map(e => e.id === pendingEmployee.id ? pendingEmployee : e);
    await saveEmployees(updated);
    setShowDuplicateModal(false);
    setSubmissionSuccess(true);
    setFormDirty(false);
  };

  const handleDuplicateNew = async () => {
    const newEmp = { ...pendingEmployee, id: Math.max(...employees.map(e=>e.id||0))+1 };
    await saveEmployees([...employees, newEmp]);
    setShowDuplicateModal(false);
    setSubmissionSuccess(true);
    setFormDirty(false);
  };

  // Express interest with name capture (Fix #4 - store employee name)
  const handleExpressInterest = (project) => {
    setInterestEmailSubject(`Expression of Interest – ${project.title}`);
    setInterestEmailBody(`Hi,\n\nI would like to express my interest in the "${project.title}" project. I believe I have relevant skills and would love to learn more about how I can contribute.\n\nPlease let me know the next steps.\n\nKind regards,\n[Your name]`);
    setInterestName('');
    setSelectedProjectForInterest(project);
    setShowEmailModal(true);
  };

  const handleSendInterestEmail = async () => {
    if (!selectedProjectForInterest) return;
    const recipient = 'onecleanco@cleancoqld.com.au';
    const mailtoLink = `mailto:${recipient}?subject=${encodeURIComponent(interestEmailSubject)}&body=${encodeURIComponent(interestEmailBody)}`;
    // Use hidden anchor instead of window.location.href to avoid navigating away from the SPA
    const a = document.createElement('a');
    a.href = mailtoLink;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    const newInterest = {
      id: Date.now(), projectId: selectedProjectForInterest.id,
      projectTitle: selectedProjectForInterest.title,
      employeeName: interestName.trim() || 'Anonymous',
      createdAt: new Date().toISOString()
    };
    await saveInterests([...interests, newInterest]);
    setShowEmailModal(false);
    setSelectedProjectForInterest(null);
    setShowInterestModal(true);
  };

  // Delete / Edit employee
  const handleDeleteEmployee = async (id) => {
    const emp = employees.find(e=>e.id===id);
    if (!emp || !window.confirm(`Delete ${emp.name}? This cannot be undone.`)) return;
    await saveEmployees(employees.filter(e=>e.id!==id));
    await saveInterests(interests.filter(i=>i.employeeId!==id));
  };

  const openEditEmployee = (emp) => {
    setEditingEmployee(emp);
    setEditSkillInputs(emp.skills?.length ? emp.skills.map(s=>({...s})) : [{name:'',level:'Intermediate',category:'General'}]);
    setEditGrowthInput((emp.growthAreas||[]).join('\n'));
    setShowEditEmployee(true);
  };

  const handleEditSave = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const valid = editSkillInputs.filter(s=>s.name.trim());
    const updated = {
      ...editingEmployee,
      name: formData.get('name'), role: formData.get('role'),
      department: formData.get('department'), team: formData.get('team'),
      availability: formData.get('availability'), skills: valid,
      growthAreas: parseGrowthAreas(editGrowthInput)
    };
    await saveEmployees(employees.map(e=>e.id===editingEmployee.id ? updated : e));
    setShowEditEmployee(false);
    setEditingEmployee(null);
  };

  const handleAdminAddEmployee = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const valid = adminSkillInputs.filter(s=>s.name.trim());
    if (valid.length === 0) { showToast('Please add at least one skill.', 'error'); return; }
    const newEmp = {
      id: employees.length ? Math.max(...employees.map(e=>e.id||0))+1 : 1,
      name: formData.get('name'), role: formData.get('role'),
      department: formData.get('department'), team: formData.get('team'),
      availability: formData.get('availability'),
      skills: valid, growthAreas: parseGrowthAreas(adminGrowthInput)
    };
    await saveEmployees([...employees, newEmp]);
    setShowAddEmployee(false);
    setAdminSkillInputs([{name:'',level:'Intermediate',category:'General'}]);
    setAdminGrowthInput('');
  };

  // ── Filtered lists ─────────────────────────────────────────────────────────
  const filteredProjects = projects.filter(p => {
    const q = projectSearch.toLowerCase();
    return (q==='' || p.title.toLowerCase().includes(q) || (p.requiredSkills||[]).some(s=>s.toLowerCase().includes(q))) &&
           (projectDept==='all' || p.department===projectDept);
  });

  const dirTeams = dirDept==='all' ? teams : [...new Set(employees.filter(e=>e.department===dirDept).map(e=>e.team).filter(Boolean))];

  const filteredEmployees = employees.filter(emp => {
    const q = dirSearch.toLowerCase();
    return (emp.name.toLowerCase().includes(q) ||
            (emp.skills||[]).some(s=>s.name.toLowerCase().includes(q)) ||
            (emp.growthAreas||[]).some(a=>a.toLowerCase().includes(q))) &&

                <div className="col-span-2">
                  <label className="block text-xs font-semibold text-slate-600 mb-1">Availability *</label>
                  <select name="availability" required defaultValue={editingEmployee.availability} className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
                    <option value="Available">Available</option>
                    <option value="Partially Available">Partially Available</option>
                    <option value="Busy">Busy</option>
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-2">Skills *</label>
                <SkillRowBuilder skillInputs={editSkillInputs} setSkillInputs={setEditSkillInputs} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Wants to Learn</label>
                <textarea value={editGrowthInput} onChange={e=>setEditGrowthInput(e.target.value)} rows="2"
                  className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
              </div>
              <div className="flex gap-3 pt-2">
                <button type="submit" className="flex-1 py-2.5 bg-sky-600 text-white rounded-xl font-semibold hover:bg-sky-700 text-sm">Save Changes</button>
                <button type="button" onClick={()=>setShowEditEmployee(false)} className="px-5 py-2.5 border border-slate-300 text-slate-700 rounded-xl text-sm hover:bg-slate-50">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Add Project modal */}
      {showAddProject && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in">
          <div className="bg-white rounded-2xl p-6 max-w-lg w-full shadow-xl">
            <div className="flex items-center justify-between mb-5">
              <h3 className="text-lg font-bold">Add New Project</h3>
              <button onClick={()=>setShowAddProject(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100"><X className="w-4 h-4" /></button>
            </div>
            <form onSubmit={e=>{
              e.preventDefault();
              const fd = new FormData(e.target);
              const newProject = {
                id: projects.length ? Math.max(...projects.map(p=>p.id||0))+1 : 1,
                title: fd.get('title'), manager: fd.get('manager'), description: fd.get('description'),
                department: fd.get('department'), duration: fd.get('duration'),
                requiredSkills: fd.get('skills').split(',').map(s=>s.trim()).filter(Boolean),
                status:'Open'
              };
              saveProjects([...projects, newProject]);
              setShowAddProject(false);
            }} className="space-y-4">
              {[['title','Project Title',''],['manager','Responsible Manager','Full name'],['description','Brief Description','What will participants do?'],['department','Business Unit',''],['duration','Duration','e.g. 4–6 weeks']].map(([n,l,p])=>(
                <div key={n}>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">{l} *</label>
                  {n==='description' ? (
                    <textarea name={n} required rows="2" placeholder={p} className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                  ) : (
                    <input name={n} required placeholder={p} className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                  )}
                </div>
              ))}
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Required Skills * (comma-separated)</label>
                <input name="skills" required placeholder="Stakeholder Engagement, Data Analysis, Finance" className="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
              </div>
              <div className="flex gap-3 pt-2">
                <button type="submit" className="flex-1 py-2.5 bg-sky-600 text-white rounded-xl font-semibold hover:bg-sky-700 text-sm">Add Project</button>
                <button type="button" onClick={()=>setShowAddProject(false)} className="px-5 py-2.5 border border-slate-300 text-slate-700 rounded-xl text-sm hover:bg-slate-50">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* ── Toast Notification ── */}
      {toast && (
        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-xl shadow-lg text-sm font-semibold text-white transition-all animate-fade-in flex items-center gap-2 ${toast.type==='error' ? 'bg-red-500' : 'bg-emerald-500'}`}>
          {toast.type==='error' ? '✕' : '✓'} {toast.msg}
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SkillsMarketplace />);
</script>
</body>
</html>
